<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — ГлавТурник KG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e6edf3;font-family:Inter,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1c2128;border:1px solid #30363d;border-radius:16px;padding:40px;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{font-size:40px;display:block;margin-bottom:8px}
.logo-text{font-size:20px;font-weight:700;color:#f5b800}
.logo-sub{font-size:13px;color:#8b949e;margin-top:4px}
h1{font-size:22px;font-weight:700;margin-bottom:24px;text-align:center}
.error{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.4);color:#f85149;border-radius:8px;padding:10px 14px;margin-bottom:20px;font-size:14px}
label{display:block;font-size:13px;font-weight:500;color:#8b949e;margin-bottom:6px}
input{width:100%;background:#0f1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;color:#e6edf3;font-size:15px;outline:none;transition:.2s}
input:focus{border-color:#f5b800}
.field{margin-bottom:16px}
button{width:100%;background:#f5b800;color:#0f1117;font-weight:700;font-size:15px;border:none;border-radius:8px;padding:12px;cursor:pointer;margin-top:8px;transition:.2s}
button:hover{background:#ffc929}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">⚡</span>
    <div class="logo-text">ГлавТурник KG</div>
    <div class="logo-sub">Панель управления</div>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Логин</label>
      <input type="text" name="username" autofocus autocomplete="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" autocomplete="current-password">
    </div>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
